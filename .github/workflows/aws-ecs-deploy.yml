name: AWS ECS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  BACKEND_REPO: minorproject-backend
  FRONTEND_REPO: minorproject-frontend

jobs:
  build-and-push:
    name: Build and push Docker images to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repositories exist
        run: |
          aws ecr describe-repositories --repository-names "$BACKEND_REPO" || aws ecr create-repository --repository-name "$BACKEND_REPO"
          aws ecr describe-repositories --repository-names "$FRONTEND_REPO" || aws ecr create-repository --repository-name "$FRONTEND_REPO"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          cd backend/server
          docker build -t $BACKEND_REPO .

      - name: Build frontend image
        run: |
          cd frontend
          docker build \
            --build-arg NEXT_PUBLIC_PREVIEW_URL="${{ secrets.NEXT_PUBLIC_PREVIEW_URL }}" \
            --build-arg NEXT_PUBLIC_BACKEND_URL="${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BACKEND_SOCKET_PATH="${{ secrets.NEXT_PUBLIC_BACKEND_SOCKET_PATH }}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            -t $FRONTEND_REPO .

      - name: Tag and push images
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_TAG=${GITHUB_SHA::7}
          docker tag $BACKEND_REPO "$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG"
          docker tag $FRONTEND_REPO "$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG"
          echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_URI=$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_URI=$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG" >> $GITHUB_ENV

  deploy:
    name: Deploy ECS stack
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECS CloudFormation stack
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws cloudformation deploy \
            --stack-name minorproject-ecs \
            --template-file infra/aws-ecs/ecs-stack.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              FrontendImageUri="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_REPO}:${GITHUB_SHA}" \
              BackendImageUri="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_REPO}:${GITHUB_SHA}" \
              ClerkPublishableKey="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
              ClerkSecretKey="${{ secrets.CLERK_SECRET_KEY }}" \
              LiveblocksSecretKey="${{ secrets.LIVEBLOCKS_SECRET_KEY }}" \
              CloudflareApiKey="${{ secrets.CLOUDFLARE_API_KEY }}" \
              NextPublicPreviewUrl="${{ secrets.NEXT_PUBLIC_PREVIEW_URL }}" \
              NextPublicBackendUrl="${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" \
              NextPublicBackendSocketPath="${{ secrets.NEXT_PUBLIC_BACKEND_SOCKET_PATH }}"

      - name: Output service endpoint
        run: |
          aws cloudformation describe-stacks --stack-name minorproject-ecs --query "Stacks[0].Outputs" --output table
